<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Покана за бал</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #fff;
      overflow: hidden;
    }
    .invite-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 3rem 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
      max-width: 600px;
      animation: fadeIn 2s ease-in-out;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: -webkit-linear-gradient(#f9d423, #ff4e50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-family: 'Sora', sans-serif;
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn.primary {
      background: linear-gradient(45deg, #ff4e50, #f9d423);
      color: #fff;
      padding: 10px 30px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: inline-block;
    }
    .btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 15px rgba(249, 212, 35, 0.4);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg-ambient" aria-hidden="true"></div>
  <div class="invite-card">
    <h1>Изненада! 🎉</h1>
    <p>Уважаема инж. Бонева,</p>
    <p>Имаме огромното удоволствие да Ви поканим на нашия абитуриентски бал! Ще се радваме да споделите този специален за нас момент.</p>
    <p>Очакваме Ви!</p>
    <a href="index.html" class="btn primary">Обратно към проекта</a>
  </div>
</body>
</html>
